<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="silverStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F7"/>
      <stop offset="50%" stop-color="#D5DAE2"/>
      <stop offset="100%" stop-color="#B6BDC8"/>
    </linearGradient>
    <linearGradient id="mintFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BFCBE"/>
      <stop offset="100%" stop-color="#26D896"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo lockup top-left: app icon (rounded square 96px) + wordmark -->
  <g transform="translate(80 80)">
    <rect width="96" height="96" rx="22" fill="#0A0E14" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <g transform="translate(48 48)">
      <path
        d="M -28 0
           C -28 -19 -10 -19 0 0
           C 10 19 28 19 28 0
           C 28 -19 10 -19 0 0
           C -10 19 -28 19 -28 0 Z"
        fill="none"
        stroke="url(#silverStroke)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
      <path d="M 0 -4.5 L 4.5 0 L 0 4.5 L -4.5 0 Z" fill="url(#mintFill)"/>
    </g>
    <text x="120" y="60" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="600" fill="#F2F4F7">PluriFin</text>
  </g>
  <!-- Headline -->
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#F2F4F7" letter-spacing="-2">Portfolio Manager</text>
  <!-- Subhead -->
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="rgba(242,244,247,0.78)">Workspace privacy-first per intelligence di portafoglio</text>
  <!-- Trust badges -->
  <g transform="translate(80 490)">
    <rect width="200" height="44" rx="22" fill="rgba(91,252,190,0.10)" stroke="rgba(91,252,190,0.30)" stroke-width="1"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#5BFCBE" text-anchor="middle">12 broker</text>
  </g>
  <g transform="translate(296 490)">
    <rect width="200" height="44" rx="22" fill="rgba(91,252,190,0.10)" stroke="rgba(91,252,190,0.30)" stroke-width="1"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#5BFCBE" text-anchor="middle">AES-256</text>
  </g>
  <g transform="translate(512 490)">
    <rect width="200" height="44" rx="22" fill="rgba(91,252,190,0.10)" stroke="rgba(91,252,190,0.30)" stroke-width="1"/>
    <text x="100" y="28" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#5BFCBE" text-anchor="middle">6 lingue</text>
  </g>
  <!-- Decorative big infinity bottom-right (faded) -->
  <g transform="translate(900 360)" opacity="0.18">
    <path
      d="M -210 0
         C -210 -130 -75 -130 0 0
         C 75 130 210 130 210 0
         C 210 -130 75 -130 0 0
         C -75 130 -210 130 -210 0 Z"
      fill="none"
      stroke="url(#silverStroke)"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <path d="M 0 -28 L 28 0 L 0 28 L -28 0 Z" fill="url(#mintFill)"/>
  </g>
</svg>
