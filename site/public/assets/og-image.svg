<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFA5"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#accent-grad)"/>
  <text x="116" y="132" font-family="Inter,sans-serif" font-size="38" font-weight="700" fill="white" text-anchor="middle">P</text>
  <!-- Brand name -->
  <text x="172" y="131" font-family="Inter,sans-serif" font-size="28" font-weight="600" fill="white" opacity="0.95">PluriFin</text>
  <!-- Headline -->
  <text x="80" y="340" font-family="Inter,sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-2">Portfolio Manager</text>
  <!-- Subhead -->
  <text x="80" y="410" font-family="Inter,sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.82)">Workspace privacy-first per intelligence di portafoglio</text>
  <!-- Trust badges -->
  <g transform="translate(80, 490)">
    <rect width="200" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
    <text x="100" y="28" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">12 broker</text>
  </g>
  <g transform="translate(296, 490)">
    <rect width="200" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
    <text x="100" y="28" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">AES-256</text>
  </g>
  <g transform="translate(512, 490)">
    <rect width="200" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
    <text x="100" y="28" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">6 lingue</text>
  </g>
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="rgba(0,191,165,0.12)"/>
  <circle cx="1100" cy="500" r="120" fill="rgba(255,255,255,0.05)"/>
</svg>
