name: Market Data Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Daily after US market close (UTC-based schedule)
    - cron: "35 22 * * *"

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: market-data-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore previous market_history.db from last success artifact
        # W3.CF-BOT-V2 (2026-05-07): bypass Cloudflare BFM (Free plan blocks
        # GH runner IPs on plurifin.app, so the script's HTTP download of
        # market_history.db.zip from Pages 403s -> falls back to "fresh
        # start" -> burns 100k EODHD calls / day in 365-day rebuild).
        # Restore the .db locally before the Python step. The script's
        # fetch_history_db() function early-returns if db_path exists
        # (build_daily_market_snapshot.py line 749), so the HTTP download
        # is skipped and backfill is incremental (~8k calls/day).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/market-data
          LATEST_RUN_ID=$(gh run list \
            --workflow=market-data-snapshot.yml \
            --status=success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$LATEST_RUN_ID" ] || [ "$LATEST_RUN_ID" = "null" ]; then
            echo "::warning::No previous successful run -- starting fresh (~100k EODHD calls)."
            exit 0
          fi
          echo "Restoring DB from previous run $LATEST_RUN_ID..."
          rm -rf /tmp/md-prev /tmp/md-prev-extracted
          if ! gh run download "$LATEST_RUN_ID" --name github-pages --dir /tmp/md-prev; then
            echo "::warning::Artifact unavailable (>14d retention?) -- starting fresh."
            exit 0
          fi
          mkdir -p /tmp/md-prev-extracted
          if [ -f /tmp/md-prev/artifact.tar ]; then
            tar -xf /tmp/md-prev/artifact.tar -C /tmp/md-prev-extracted
          else
            cp -r /tmp/md-prev/. /tmp/md-prev-extracted/
          fi
          if [ -f /tmp/md-prev-extracted/market_history.db.zip ]; then
            cd /tmp/md-prev-extracted
            unzip -o market_history.db.zip -d "$GITHUB_WORKSPACE/dist/market-data/" >/dev/null
            cd "$GITHUB_WORKSPACE"
            echo "DB restored: $(stat -c%s dist/market-data/market_history.db) bytes"
          else
            echo "::warning::market_history.db.zip not in artifact -- starting fresh."
            ls -la /tmp/md-prev-extracted/
          fi

      - name: Build daily market snapshot
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          MARKETS: US,LSE,XETRA,PA,TO,HK,AU,NSE
        run: |
          # HISTORY_URL is kept as fallback for fresh installs / lost
          # artifacts. Normally the previous step has already populated
          # dist/market-data/market_history.db, so fetch_history_db()
          # short-circuits without the HTTP request.
          HISTORY_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/market_history.db.zip"
          # NOTE: --min-dollar-volume / --min-price are the legacy raw floor.
          # Investor-grade per-timeframe filters (scaled liquidity, anti-split
          # cap, history depth, ticker pattern exclusion) are on by default
          # via --investor-grade-filters; --investor-min-price tightens the
          # penny-stock floor to USD 5.
          python scripts/eodhd/build_daily_market_snapshot.py \
            --output-dir dist/market-data \
            --log-file "${{ github.workspace }}/dist/logs/pipeline.log" \
            --markets "$MARKETS" \
            --history-db-name market_history.db \
            --history-db-zip-name market_history.db.zip \
            --history-db-url "$HISTORY_URL" \
            --history-bootstrap-backtrack-days 12 \
            --history-backfill-days 365 \
            --top-limit 50 \
            --min-dollar-volume 1000000 \
            --min-price 1.0 \
            --investor-grade-filters \
            --investor-min-price 5.0

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-data-logs
          path: dist/logs/pipeline.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/market-data

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  trigger-site-deploy:
    # After market-data deploys JSON-only Pages, trigger site-deploy to
    # restore the full Astro site (HTML + legal pages + market data merged).
    # Without this, the last-writer-wins Pages race leaves the site as JSON-only.
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger site-deploy to restore full site HTML
        run: gh workflow run site-deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@v7
        env:
          FAILED_JOBS: "build=${{ needs.build.result }} deploy=${{ needs.deploy.result }}"
        with:
          script: |
            const title = 'Market Data Snapshot workflow failure';
            const failedJobs = process.env.FAILED_JOBS;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${context.workflow}** failed on ${new Date().toISOString()}.`,
              '',
              `- Run: ${runUrl}`,
              `- Jobs: ${failedJobs}`,
              `- Trigger: ${context.eventName}`,
              '',
              'Market snapshot may be stale until this is fixed.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
              per_page: 50,
            });
            const match = existing.data.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-failure'],
              });
            }
