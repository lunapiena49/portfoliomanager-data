name: Market Data Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Daily after US market close (UTC-based schedule)
    - cron: "35 22 * * *"

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: market-data-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build daily market snapshot
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          MARKETS: US,LSE,XETRA,PA,TO,HK,AU,NSE
        run: |
          HISTORY_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/market_history.db.zip"
          # NOTE: --min-dollar-volume / --min-price are the legacy raw floor.
          # Investor-grade per-timeframe filters (scaled liquidity, anti-split
          # cap, history depth, ticker pattern exclusion) are on by default
          # via --investor-grade-filters; --investor-min-price tightens the
          # penny-stock floor to USD 5.
          python scripts/eodhd/build_daily_market_snapshot.py \
            --output-dir dist/market-data \
            --log-file "${{ github.workspace }}/dist/logs/pipeline.log" \
            --markets "$MARKETS" \
            --history-db-name market_history.db \
            --history-db-zip-name market_history.db.zip \
            --history-db-url "$HISTORY_URL" \
            --history-bootstrap-backtrack-days 12 \
            --history-backfill-days 365 \
            --top-limit 50 \
            --min-dollar-volume 1000000 \
            --min-price 1.0 \
            --investor-grade-filters \
            --investor-min-price 5.0

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-data-logs
          path: dist/logs/pipeline.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/market-data

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@v7
        env:
          FAILED_JOBS: "build=${{ needs.build.result }} deploy=${{ needs.deploy.result }}"
        with:
          script: |
            const title = 'Market Data Snapshot workflow failure';
            const failedJobs = process.env.FAILED_JOBS;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${context.workflow}** failed on ${new Date().toISOString()}.`,
              '',
              `- Run: ${runUrl}`,
              `- Jobs: ${failedJobs}`,
              `- Trigger: ${context.eventName}`,
              '',
              'Market snapshot may be stale until this is fixed.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
              per_page: 50,
            });
            const match = existing.data.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-failure'],
              });
            }
