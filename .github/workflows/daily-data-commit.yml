name: Daily Data Commit

# Scopo: al primo utilizzo giornaliero dell'app (trigger cron mattutino + manuale)
# scarica l'ultimo snapshot pubblicato su GitHub Pages dal workflow market-data-snapshot.yml
# e committa su main il delta del top_movers.json + una riga in docs/DATA_SNAPSHOT_LOG.md.
#
# I file pesanti (prices_index.json ~13MB, market_history.db.zip ~950MB) restano solo
# su Pages -- il .gitignore li esclude dal repo.

on:
  workflow_dispatch:
  schedule:
    # 07:00 UTC = 08:00/09:00 CET, prima dell'orario tipico di utilizzo.
    - cron: "0 7 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-data-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest snapshot from GitHub Pages
        id: download
        run: |
          set -euo pipefail
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          mkdir -p dist/market-data
          echo "Downloading top_movers.json from $BASE ..."
          # Retry up to 3 times (60s, 120s, 240s) before giving up -- this
          # distinguishes "not yet published" (transient) from a real outage.
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SUCCESS=0
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            if curl -fsSL --max-time 120 "$BASE/top_movers.json" -o dist/market-data/top_movers.json; then
              SUCCESS=1
              break
            fi
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              SLEEP=$((60 * ATTEMPT))
              echo "Attempt $ATTEMPT failed, retrying in ${SLEEP}s..."
              sleep $SLEEP
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done
          if [ $SUCCESS -ne 1 ]; then
            echo "::error::Pages artifact unreachable after $MAX_ATTEMPTS attempts."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Extract as_of_date from snapshot
        if: steps.download.outputs.skip != 'true'
        id: meta
        run: |
          set -euo pipefail
          AS_OF=$(python -c "import json; d=json.load(open('dist/market-data/top_movers.json')); print(d.get('as_of_date') or d.get('generated_at_utc') or 'unknown')")
          echo "as_of=$AS_OF" >> "$GITHUB_OUTPUT"
          echo "Snapshot as_of: $AS_OF"

      - name: Append to DATA_SNAPSHOT_LOG
        if: steps.download.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p docs
          LOG=docs/DATA_SNAPSHOT_LOG.md
          TODAY=$(date -u +%Y-%m-%d)
          AS_OF="${{ steps.meta.outputs.as_of }}"
          if [ ! -f "$LOG" ]; then
            {
              echo "# Data Snapshot Log"
              echo ""
              echo "Storico append-only dei sync giornalieri prodotti da \`daily-data-commit.yml\`."
              echo "Formato: \`| run_date_utc | snapshot_as_of |\`"
              echo ""
              echo "| Run (UTC) | Snapshot as_of |"
              echo "|---|---|"
            } > "$LOG"
          fi
          # Idempotenza: non appendere due volte la stessa coppia (TODAY, AS_OF).
          if ! grep -qF "| $TODAY | $AS_OF |" "$LOG"; then
            echo "| $TODAY | $AS_OF |" >> "$LOG"
          else
            echo "Row already present in log, skipping append."
          fi

      - name: Commit if changed
        if: steps.download.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/market-data/top_movers.json docs/DATA_SNAPSHOT_LOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          AS_OF="${{ steps.meta.outputs.as_of }}"
          git commit -m "chore(data): daily snapshot $DATE (as_of $AS_OF)"
          git push origin HEAD:main

  notify-failure:
    runs-on: ubuntu-latest
    needs: commit
    if: ${{ always() && needs.commit.result == 'failure' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily Data Commit workflow failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${context.workflow}** failed on ${new Date().toISOString()}.`,
              '',
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              '',
              'Proof-of-freshness commit may be missing; check Pages availability.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
              per_page: 50,
            });
            const match = existing.data.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-failure'],
              });
            }
