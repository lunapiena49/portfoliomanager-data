name: Daily Data Commit

# Scopo: al primo utilizzo giornaliero dell'app (trigger cron mattutino + manuale)
# scarica l'ultimo snapshot pubblicato su GitHub Pages dal workflow market-data-snapshot.yml
# e committa su main il delta del top_movers.json + una riga in docs/DATA_SNAPSHOT_LOG.md.
#
# I file pesanti (prices_index.json ~13MB, market_history.db.zip ~950MB) restano solo
# su Pages -- il .gitignore li esclude dal repo.

on:
  workflow_dispatch:
  schedule:
    # 07:00 UTC = 08:00/09:00 CET, prima dell'orario tipico di utilizzo.
    - cron: "0 7 * * *"

permissions:
  contents: write
  issues: write
  actions: read   # W3.CF-BOT-V2 (2026-05-06): needed for `gh run download`
                  # to bypass Cloudflare BFM (which blocks GH Actions runner
                  # IPs via curl on the Free plan -- WAF custom rules cannot
                  # skip BFM basic, only SBFM Pro).

concurrency:
  group: daily-data-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest top_movers.json from snapshot artifact
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # W3.CF-BOT-V4 (2026-05-08): iterate over recent completed runs,
          # not just successful ones. Since market-data-snapshot.yml v4 uses
          # `if: always()` on Upload Pages artifact, every completed run
          # uploads the DB and top_movers.json (preserving previous run's
          # data when the script fails). The chain is therefore unbroken
          # across consecutive failures, but only iteration finds the most
          # recent artifact regardless of conclusion.
          #
          # W3.CF-BOT-V2 (2026-05-06): download via GitHub Actions artifact
          # API instead of curl-from-Pages. Why: Cloudflare BFM (Free plan)
          # blocks Azure runner IPs returning HTTP 403 even with a custom
          # WAF skip rule, because BFM basic is a global toggle that custom
          # rules cannot override on Free. The artifact API bypasses CF
          # entirely. Same pattern as site-deploy.yml CC-P1-DB v2.
          mkdir -p dist/market-data
          # CRITICAL: validate the candidate artifact CONTAINS top_movers.json
          # before accepting it. An "early-abort" market-data-snapshot run
          # (safety check fired before producing top_movers.json) could
          # upload an artifact missing this file -- skip those.
          RESTORED=""
          for CANDIDATE_RUN in $(gh run list \
              --workflow=market-data-snapshot.yml \
              --status=completed \
              --limit 10 \
              --json databaseId \
              --jq '.[].databaseId'); do
            echo "Trying artifact from run $CANDIDATE_RUN..."
            rm -rf /tmp/md-artifact /tmp/md-extracted
            mkdir -p /tmp/md-extracted
            if ! gh run download "$CANDIDATE_RUN" --name github-pages --dir /tmp/md-artifact 2>/dev/null; then
              echo "  Download failed -- trying older run."
              continue
            fi
            # Wrap tar in conditional to bypass `set -e` on corrupt artifact.
            if [ -f /tmp/md-artifact/artifact.tar ]; then
              if ! tar -xf /tmp/md-artifact/artifact.tar -C /tmp/md-extracted 2>/dev/null; then
                echo "  tar extraction failed -- trying older run."
                continue
              fi
            else
              cp -r /tmp/md-artifact/. /tmp/md-extracted/ 2>/dev/null || {
                echo "  cp failed -- trying older run."
                continue
              }
            fi
            if [ ! -f /tmp/md-extracted/top_movers.json ]; then
              echo "  Artifact missing top_movers.json -- trying older run."
              continue
            fi
            # Sanity check: top_movers.json must be reasonably sized (>= 1KB).
            JSON_SIZE=$(stat -c%s /tmp/md-extracted/top_movers.json 2>/dev/null || echo 0)
            if [ "$JSON_SIZE" -lt 1024 ]; then
              echo "  top_movers.json suspiciously small ($JSON_SIZE bytes) -- trying older run."
              continue
            fi
            # Validate JSON parses correctly + has as_of_date.
            if ! python -c "import json,sys; d=json.load(open('/tmp/md-extracted/top_movers.json')); assert d.get('as_of_date'), 'no as_of_date'" 2>/dev/null; then
              echo "  top_movers.json invalid JSON or missing as_of_date -- trying older run."
              continue
            fi
            RESTORED="$CANDIDATE_RUN"
            break
          done
          if [ -z "$RESTORED" ]; then
            echo "::error::No restorable market-data-snapshot artifact (with valid top_movers.json) in last 10 completed runs."
            exit 1
          fi
          echo "Using artifact from run $RESTORED ($JSON_SIZE bytes)."
          cp /tmp/md-extracted/top_movers.json dist/market-data/top_movers.json
          echo "Got top_movers.json: $(stat -c%s dist/market-data/top_movers.json) bytes"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Extract as_of_date from snapshot
        if: steps.download.outputs.skip != 'true'
        id: meta
        run: |
          set -euo pipefail
          AS_OF=$(python -c "import json; d=json.load(open('dist/market-data/top_movers.json')); print(d.get('as_of_date') or d.get('generated_at_utc') or 'unknown')")
          echo "as_of=$AS_OF" >> "$GITHUB_OUTPUT"
          echo "Snapshot as_of: $AS_OF"

      - name: Append to DATA_SNAPSHOT_LOG
        if: steps.download.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p docs
          LOG=docs/DATA_SNAPSHOT_LOG.md
          TODAY=$(date -u +%Y-%m-%d)
          AS_OF="${{ steps.meta.outputs.as_of }}"
          if [ ! -f "$LOG" ]; then
            {
              echo "# Data Snapshot Log"
              echo ""
              echo "Storico append-only dei sync giornalieri prodotti da \`daily-data-commit.yml\`."
              echo "Formato: \`| run_date_utc | snapshot_as_of |\`"
              echo ""
              echo "| Run (UTC) | Snapshot as_of |"
              echo "|---|---|"
            } > "$LOG"
          fi
          # Idempotenza: non appendere due volte la stessa coppia (TODAY, AS_OF).
          if ! grep -qF "| $TODAY | $AS_OF |" "$LOG"; then
            echo "| $TODAY | $AS_OF |" >> "$LOG"
          else
            echo "Row already present in log, skipping append."
          fi

      - name: Commit if changed
        if: steps.download.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/market-data/top_movers.json docs/DATA_SNAPSHOT_LOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          AS_OF="${{ steps.meta.outputs.as_of }}"
          git commit -m "chore(data): daily snapshot $DATE (as_of $AS_OF)"
          git push origin HEAD:main

  notify-failure:
    runs-on: ubuntu-latest
    needs: commit
    if: ${{ always() && needs.commit.result == 'failure' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily Data Commit workflow failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${context.workflow}** failed on ${new Date().toISOString()}.`,
              '',
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              '',
              'Proof-of-freshness commit may be missing; check Pages availability.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
              per_page: 50,
            });
            const match = existing.data.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-failure'],
              });
            }
