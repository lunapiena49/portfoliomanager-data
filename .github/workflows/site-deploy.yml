# PluriFin marketing site -- build + deploy to GitHub Pages
# Triggered on push to main when files under site/ change.
# The Flutter webapp under app/ is NOT touched by this workflow.
# Runs alongside the existing market-data workflows (market-data-snapshot.yml,
# daily-data-commit.yml) without interfering.

name: site-deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          # Custom domain (CNAME plurifin.app) -> root base
          SITE_URL: https://plurifin.app
          SITE_BASE: /
        run: npm run build

      # The Astro build outputs to site/dist/. Pages upload-pages-artifact
      # replaces the entire Pages content; without merging, legal/ HTML and
      # market-data top_movers.json from outside site/ disappear after deploy.
      - name: Merge static assets (legal/, market-data, CNAME) into site/dist
        run: |
          set -euo pipefail
          # CNAME for custom domain -- must be at site root.
          if [ -f CNAME ]; then
            cp CNAME site/dist/CNAME
          fi
          # Legal HTML (rendered by scripts/legal/build_legal_html.ps1 -> dist/legal/<lang>/*.html).
          if [ -d dist/legal ]; then
            mkdir -p site/dist/legal
            cp -r dist/legal/. site/dist/legal/
          fi
          # Market data: expose top_movers.json at root (consumed by daily-data-commit.yml
          # via curl https://<owner>.github.io/<repo>/top_movers.json).
          if [ -f dist/market-data/top_movers.json ]; then
            cp dist/market-data/top_movers.json site/dist/top_movers.json
          fi
          # Also expose under /market-data/ for clients preferring namespaced paths.
          if [ -d dist/market-data ]; then
            mkdir -p site/dist/market-data
            for f in dist/market-data/top_movers.json dist/market-data/.gitkeep; do
              if [ -f "$f" ]; then cp "$f" "site/dist/market-data/$(basename "$f")"; fi
            done
          fi
          ls -la site/dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact (site/dist/ + merged static assets)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
