# PluriFin marketing site -- build + deploy to GitHub Pages
# Triggered on push to main when files under site/ change.
# The Flutter webapp under app/ is NOT touched by this workflow.
# Runs alongside the existing market-data workflows (market-data-snapshot.yml,
# daily-data-commit.yml) without interfering.

name: site-deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          # Custom domain plurifin.app served at root (CNAME in site/public/).
          SITE_URL: https://plurifin.app
          SITE_BASE: /
        run: npm run build

      # The Astro build outputs to site/dist/.
      # We need to merge it with the existing Pages content (app/, legal/, dist/).
      # Strategy: copy the full Pages artifact first, then overlay the site build.
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact (site/dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
