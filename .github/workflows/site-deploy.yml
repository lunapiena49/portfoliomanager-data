# PluriFin marketing site -- build + deploy to GitHub Pages
# Triggered on push to main when files under site/ change.
# The Flutter webapp under app/ is NOT touched by this workflow.
# Runs alongside the existing market-data workflows (market-data-snapshot.yml,
# daily-data-commit.yml) without interfering.

name: site-deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'app/**'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # CC-P1-DB v2: needed for `gh run download` of market-data artifact

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          # Custom domain (CNAME plurifin.app) -> root base
          SITE_URL: https://plurifin.app
          SITE_BASE: /
        run: npm run build

      # CC-P1-DB v2 + W3.CF-BOT-V4 (2026-05-08): restore market-data binary
      # assets (~830MB DB zip + lookup tables) from the most recent
      # market-data-snapshot artifact, iterating over completed runs (not
      # just success). Since market-data-snapshot.yml v4 uses if:always
      # upload, every completed run uploads its DB state -- chain is
      # unbroken across consecutive failures, but only iteration finds the
      # most recent artifact regardless of conclusion.
      #
      # Why not curl from Pages: site-deploy is auto-triggered by market-
      # data-snapshot's `trigger-site-deploy` job ~3s after market-data
      # deploys to Pages. Cloudflare CDN cache hasn't propagated the new
      # files yet (still serves stale 404 from before the deploy), so the
      # curl fallback fails and the DB zip gets wiped on every cycle.
      # CC-P1-DB v1 (commit 62a787d) had this race; v2 bypasses Cloudflare
      # entirely by pulling the artifact straight from the GitHub Actions
      # API.
      #
      # The market-data-snapshot.yml uploads the same files to Pages and as
      # artifact `github-pages`, so the artifact == what was just deployed.
      - name: Restore market-data binaries from latest market-data-snapshot artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/market-data
          # CRITICAL: validate the candidate artifact CONTAINS the expected
          # files before accepting it. An "early-abort" run could upload
          # an artifact missing market_history.db.zip -- skip those.
          RESTORED=""
          for CANDIDATE_RUN in $(gh run list \
              --repo "${{ github.repository }}" \
              --workflow=market-data-snapshot.yml \
              --status=completed \
              --limit 10 \
              --json databaseId \
              --jq '.[].databaseId' 2>/dev/null); do
            echo "Trying artifact from run $CANDIDATE_RUN..."
            rm -rf /tmp/md-artifact /tmp/md-extracted
            mkdir -p /tmp/md-extracted
            if ! gh run download "$CANDIDATE_RUN" \
                --repo "${{ github.repository }}" \
                --name github-pages \
                --dir /tmp/md-artifact 2>/dev/null; then
              echo "  Download failed -- trying older run."
              continue
            fi
            if [ ! -f /tmp/md-artifact/artifact.tar ]; then
              echo "  artifact.tar missing in download -- trying older run."
              ls -la /tmp/md-artifact/ 2>/dev/null || true
              continue
            fi
            # Wrap tar in conditional to bypass `set -e` on corrupt artifact.
            if ! tar -xf /tmp/md-artifact/artifact.tar -C /tmp/md-extracted 2>/dev/null; then
              echo "  tar extraction failed (corrupt artifact?) -- trying older run."
              continue
            fi
            # site-deploy needs at least top_movers.json (HTML site references
            # it). market_history.db.zip + prices_index.json are bonus (used
            # by the app webapp). Validate top_movers.json presence.
            if [ ! -f /tmp/md-extracted/top_movers.json ]; then
              echo "  Artifact missing top_movers.json -- trying older run."
              continue
            fi
            JSON_SIZE=$(stat -c%s /tmp/md-extracted/top_movers.json 2>/dev/null || echo 0)
            if [ "$JSON_SIZE" -lt 1024 ]; then
              echo "  top_movers.json suspiciously small ($JSON_SIZE bytes) -- trying older run."
              continue
            fi
            # Validate JSON parses correctly + has as_of_date.
            if ! python3 -c "import json; d=json.load(open('/tmp/md-extracted/top_movers.json')); assert d.get('as_of_date'), 'no as_of_date'" 2>/dev/null; then
              echo "  top_movers.json invalid JSON or missing as_of_date -- trying older run."
              continue
            fi
            RESTORED="$CANDIDATE_RUN"
            break
          done
          if [ -z "$RESTORED" ]; then
            echo "WARN: no restorable market-data-snapshot artifact (with valid top_movers.json) in last 10 completed runs"
            exit 0
          fi
          echo "Restoring from market-data-snapshot run #$RESTORED"
          # Copy all market data files (top_movers.json, prices_index.json,
          # market_history.db.zip if present) from the validated artifact
          # into dist/market-data/ for the merge step downstream.
          cp -r /tmp/md-extracted/. dist/market-data/
          echo "OK: market-data binaries restored"
          ls -lh dist/market-data/

      # The Astro build outputs to site/dist/. Pages upload-pages-artifact
      # replaces the entire Pages content; without merging, legal/ HTML and
      # market-data binaries from outside site/ disappear after deploy.
      - name: Merge static assets (legal/, market-data, CNAME) into site/dist
        run: |
          set -euo pipefail
          # CNAME for custom domain -- must be at site root.
          if [ -f CNAME ]; then
            cp CNAME site/dist/CNAME
          fi
          # Legal HTML (rendered by scripts/legal/build_legal_html.ps1 -> dist/legal/<lang>/*.html).
          if [ -d dist/legal ]; then
            mkdir -p site/dist/legal
            cp -r dist/legal/. site/dist/legal/
          fi
          # Market data: expose top_movers.json at root (consumed by daily-data-commit.yml
          # via curl https://<owner>.github.io/<repo>/top_movers.json).
          if [ -f dist/market-data/top_movers.json ]; then
            cp dist/market-data/top_movers.json site/dist/top_movers.json
          fi
          # CC-P1-DB: market_history.db.zip + prices_index.json must persist
          # across site-deploys. Without these at root the market-data-snapshot
          # cron (22:35 UTC) cannot do incremental backfill and burns ~100k
          # EODHD calls re-bootstrapping the window.
          if [ -f dist/market-data/market_history.db.zip ]; then
            cp dist/market-data/market_history.db.zip site/dist/market_history.db.zip
          fi
          if [ -f dist/market-data/prices_index.json ]; then
            cp dist/market-data/prices_index.json site/dist/prices_index.json
          fi
          # Also expose under /market-data/ for clients preferring namespaced paths.
          if [ -d dist/market-data ]; then
            mkdir -p site/dist/market-data
            for f in \
              dist/market-data/top_movers.json \
              dist/market-data/market_history.db.zip \
              dist/market-data/prices_index.json \
              dist/market-data/.gitkeep \
            ; do
              if [ -f "$f" ]; then cp "$f" "site/dist/market-data/$(basename "$f")"; fi
            done
          fi
          # Flutter webapp under app/ -- pushed by app-web-deploy.yml from
          # the private app repo. Without this merge, plurifin.app/app/ -> 404
          # because Astro's site/dist/ doesn't include it.
          if [ -d app ]; then
            mkdir -p site/dist/app
            cp -r app/. site/dist/app/
            echo "Webapp merged: $(ls site/dist/app/ | head -5)"
          fi
          ls -la site/dist/ | head -50
          du -sh site/dist/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact (site/dist/ + merged static assets)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
