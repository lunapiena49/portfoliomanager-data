# PluriFin marketing site -- build + deploy to GitHub Pages
# Triggered on push to main when files under site/ change.
# The Flutter webapp under app/ is NOT touched by this workflow.
# Runs alongside the existing market-data workflows (market-data-snapshot.yml,
# daily-data-commit.yml) without interfering.

name: site-deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          # Custom domain (CNAME plurifin.app) -> root base
          SITE_URL: https://plurifin.app
          SITE_BASE: /
        run: npm run build

      # CC-P1-DB fix: preserve market-data binary assets (~950MB DB zip + lookup
      # tables) from the current Pages deploy. Without this, the Astro build's
      # upload-pages-artifact wipes Pages, including market_history.db.zip and
      # prices_index.json. The next market-data-snapshot cron then "starts fresh"
      # and burns ~100k EODHD API calls rebuilding the rolling 365-day window.
      - name: Preserve market_history.db.zip + prices_index.json from current Pages
        run: |
          set -euo pipefail
          mkdir -p dist/market-data
          # DB zip (rolling history backfill source). |\| true so first run after
          # this fix doesn't fail when the zip isn't on Pages yet.
          curl -sfL -o dist/market-data/market_history.db.zip \
            https://plurifin.app/market_history.db.zip \
            || curl -sfL -o dist/market-data/market_history.db.zip \
               https://lunapiena49.github.io/portfoliomanager-data/market_history.db.zip \
               || echo "WARN: market_history.db.zip not on Pages -- next market-data run will rebuild"
          # prices_index.json (instrument lookup table).
          curl -sfL -o dist/market-data/prices_index.json \
            https://plurifin.app/prices_index.json \
            || curl -sfL -o dist/market-data/prices_index.json \
               https://lunapiena49.github.io/portfoliomanager-data/prices_index.json \
               || echo "WARN: prices_index.json not on Pages -- next market-data run will regenerate"
          ls -lh dist/market-data/ || true

      # The Astro build outputs to site/dist/. Pages upload-pages-artifact
      # replaces the entire Pages content; without merging, legal/ HTML and
      # market-data binaries from outside site/ disappear after deploy.
      - name: Merge static assets (legal/, market-data, CNAME) into site/dist
        run: |
          set -euo pipefail
          # CNAME for custom domain -- must be at site root.
          if [ -f CNAME ]; then
            cp CNAME site/dist/CNAME
          fi
          # Legal HTML (rendered by scripts/legal/build_legal_html.ps1 -> dist/legal/<lang>/*.html).
          if [ -d dist/legal ]; then
            mkdir -p site/dist/legal
            cp -r dist/legal/. site/dist/legal/
          fi
          # Market data: expose top_movers.json at root (consumed by daily-data-commit.yml
          # via curl https://<owner>.github.io/<repo>/top_movers.json).
          if [ -f dist/market-data/top_movers.json ]; then
            cp dist/market-data/top_movers.json site/dist/top_movers.json
          fi
          # CC-P1-DB: market_history.db.zip + prices_index.json must persist
          # across site-deploys. Without these at root the market-data-snapshot
          # cron (22:35 UTC) cannot do incremental backfill and burns ~100k
          # EODHD calls re-bootstrapping the window.
          if [ -f dist/market-data/market_history.db.zip ]; then
            cp dist/market-data/market_history.db.zip site/dist/market_history.db.zip
          fi
          if [ -f dist/market-data/prices_index.json ]; then
            cp dist/market-data/prices_index.json site/dist/prices_index.json
          fi
          # Also expose under /market-data/ for clients preferring namespaced paths.
          if [ -d dist/market-data ]; then
            mkdir -p site/dist/market-data
            for f in \
              dist/market-data/top_movers.json \
              dist/market-data/market_history.db.zip \
              dist/market-data/prices_index.json \
              dist/market-data/.gitkeep \
            ; do
              if [ -f "$f" ]; then cp "$f" "site/dist/market-data/$(basename "$f")"; fi
            done
          fi
          ls -la site/dist/ | head -50
          du -sh site/dist/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact (site/dist/ + merged static assets)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
