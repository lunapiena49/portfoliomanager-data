<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="PluriFin logo">
  <defs>
    <linearGradient id="silverStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F7"/>
      <stop offset="50%" stop-color="#D5DAE2"/>
      <stop offset="100%" stop-color="#B6BDC8"/>
    </linearGradient>
    <linearGradient id="mintFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BFCBE"/>
      <stop offset="100%" stop-color="#26D896"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F7"/>
      <stop offset="100%" stop-color="#C4CAD3"/>
    </linearGradient>
  </defs>
  <!-- Glyph: rounded square + infinity + diamond -->
  <g transform="translate(20 20)">
    <rect width="160" height="160" rx="36" fill="#0A0E14"/>
    <g transform="translate(80 80)">
      <path
        d="M -50 0
           C -50 -34 -18 -34 0 0
           C 18 34 50 34 50 0
           C 50 -34 18 -34 0 0
           C -18 34 -50 34 -50 0 Z"
        fill="none"
        stroke="url(#silverStroke)"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"/>
      <path d="M 0 -8 L 8 0 L 0 8 L -8 0 Z" fill="url(#mintFill)"/>
    </g>
  </g>
  <!-- Wordmark: PluriFin in Inter-like geometric -->
  <text
    x="208"
    y="125"
    font-family="Inter, system-ui, sans-serif"
    font-size="84"
    font-weight="600"
    letter-spacing="-2"
    fill="url(#wordmark)">PluriFin</text>
</svg>
